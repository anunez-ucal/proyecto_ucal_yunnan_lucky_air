<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Boleto</title>

<style>
body {
    background-color: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
}

/* TICKET */
.ticket {
    background: white;
    width: 400px;
    border-radius: 12px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
    overflow: hidden;
}

/* CABECERA */
.ticket-header {
    background: #007BFF;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

/* CONTENIDO */
.ticket-body {
    padding: 20px;
}

.ticket-body p {
    margin: 8px 0;
}

/* CÓDIGO */
.ticket-code {
    text-align: center;
    margin-top: 15px;
    font-weight: bold;
    font-size: 18px;
    color: #333;
}

/* BOTÓN */
.btn {
    display: block;
    text-align: center;
    background: gray;
    color: white;
    padding: 10px;
    margin: 15px;
    border-radius: 8px;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    background: blue;
}
</style>
</head>

<body>

<div class="ticket">
    <div class="ticket-header">
        Boleto Confirmado
    </div>

    <div class="ticket-body">
        <p><strong>Pasajero:</strong> Juan Pérez</p>
        <p><strong>Ruta:</strong> Pekín (PEK) → Cantón (CAN)</p>
        <p><strong>Fecha:</strong> 20/04/2026</p>
        <p><strong>Hora:</strong> 08:30 AM</p>
        <p><strong>Duración:</strong> 1h 30min</p>
        <p><strong>Asiento:</strong> 12A</p>
        <p><strong>Precio:</strong> S/ 120</p>
        <p><strong>Ganaste 12 puntos</strong></p>

        <div class="ticket-code">
            Código: ABC12345
        </div>
    </div>

    <a href="#" class="btn">Volver</a>
</div>

</body>
</html>
