<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reembolso</title>
</head>
<body>
    
    <section id="reembolso">
        <div class="contenedor">
            <h2>💸 Solicitar Reembolso</h2>
    
            <form>
                <label>Número de boleto:</label><br>
                <input type="text" required><br><br>
    
                <label>Motivo:</label><br>
                <select required>
                    <option>Cancelación de vuelo</option>
                    <option>Error en compra</option>
                    <option>Otro</option>
                </select><br><br>
    
                <button type="submit" class="btn-reembolso">Solicitar reembolso</button>
            </form>
        </div>
    </section>
    
</body>
</html>
